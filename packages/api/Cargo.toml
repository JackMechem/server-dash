[package]
name = "server-dash-api"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.8"
base64 = "0.22.1"
chrono = "0.4.44"
jsonwebtoken = { version = "10.3.0", features = ["rust_crypto"] }
libc = "0.2.183"
pam = { version = "0.8.0", features = ["client"] }
rand = "0.10.0"
rustls = { version = "0.23.37", features = ["ring"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.149"
shadow-rs = "1.7.1"
sysinfo = "0.38.4"
tokio = { version = "1.50.0", features = [
    "macros",
    "net",
    "rt-multi-thread",
    "process",
    "time",
] }
tapo = "0.9.0"
zbus = "5.14.0"
webauthn-rs = "0.5"
totp-rs = { version = "5", features = ["gen_secret"] }
url = "2"
uuid = { version = "1", features = ["v4", "serde"] }
